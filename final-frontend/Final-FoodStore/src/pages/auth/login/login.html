<section class="login">
    <form id="login-form" class="login-form">
        <h1> Login </h1>
        <input 
            type="email"
            id="email"
            placeholder="Email"
            required
        >
        <input 
            type="password"
            id="password"
            placeholder="Password"
            required
        >
        <button type="submit">Ingresar</button>
    </form>
</section>
