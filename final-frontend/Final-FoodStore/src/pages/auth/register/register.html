<section class="register">
    <form id="register-form" class="register-form">
        <h1>
            Registro
        </h1>

    <input 
        type="text"
        id="name"
        placeholder="Nombre"
    />
        <input
        type="email"
        id="email"
        placeholder="Correo electrónico"
    />
    <input
        type="password"
        id="password"
        placeholder="Contraseña"
    />
    <select id="rol">
        <option value="CLIENTE">Cliente</option>
        <option value="ADMIN">Administrador</option>
    </select>
        <button type="submit">
        Registrarse
    </button>
    </form>
</section>
